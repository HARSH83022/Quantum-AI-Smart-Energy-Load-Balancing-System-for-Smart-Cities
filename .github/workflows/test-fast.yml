name: Fast Tests

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  quick-test:
    name: Quick Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install core packages first from PyPI
        pip install fastapi uvicorn sqlalchemy aiosqlite numpy pandas pytest pytest-asyncio python-dotenv scikit-learn
        # Install PyTorch separately with CPU index
        pip install torch --index-url https://download.pytorch.org/whl/cpu
    
    - name: Run quick tests
      run: |
        pytest tests/test_simple.py -v
      env:
        DATABASE_URL: sqlite+aiosqlite:///./test.db
        JWT_SECRET: test-secret
    
    - name: Validate basic structure
      run: |
        python -c "import sys; print(f'✅ Python {sys.version}')"
        python -c "import fastapi; print('✅ FastAPI available')"
        python -c "import torch; print('✅ PyTorch available')"
        python -c "import sqlalchemy; print('✅ SQLAlchemy available')"
